    <!DOCTYPE html>
    <html lang="id">
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Katalog Buku — BookCircle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../css/main.css"/>
    <link rel="stylesheet" href="../css/components.css"/>
    <link rel="stylesheet" href="../css/pages.css"/>
    <style>
        body { background: var(--snow); }
    </style>
    </head>
    <body>

    <div id="navbarMount"></div>

    <div class="catalog-layout">

    <!-- ===== FILTER SIDEBAR ===== -->
    <aside class="filter-panel" id="filterPanel">
        <div class="filter-panel-head">
        <h3>Filter</h3>
        <button class="filter-reset" onclick="resetFilters()">Reset semua</button>
        </div>

        <!-- Kategori -->
        <div class="filter-section">
        <span class="filter-section-label">Kategori</span>
        <select class="form-control" id="fCategory" onchange="applyFilters()">
            <option value="">Semua Kategori</option>
            <option>Teknik &amp; Sains</option>
            <option>Ekonomi &amp; Bisnis</option>
            <option>Hukum</option>
            <option>Kedokteran</option>
            <option>Bahasa &amp; Sastra</option>
            <option>Catatan Kuliah</option>
            <option>Psikologi</option>
            <option>Pertanian</option>
        </select>
        </div>

        <!-- Mata Kuliah / Dosen -->
        <div class="filter-section">
        <span class="filter-section-label">Mata Kuliah / Dosen</span>
        <input type="text" class="form-control" id="fCourse"
            placeholder="Cth: Kalkulus, Dr. Bambang..."
            oninput="applyFilters()"/>
        </div>

        <!-- Jenis Listing -->
        <div class="filter-section">
        <span class="filter-section-label">Jenis Listing</span>
        <div class="filter-check-list">
            <label class="filter-check"><input type="checkbox" id="fcJual"    onchange="applyFilters()"/> Dijual</label>
            <label class="filter-check"><input type="checkbox" id="fcTukar"   onchange="applyFilters()"/> Ditukar</label>
            <label class="filter-check"><input type="checkbox" id="fcDonasi"  onchange="applyFilters()"/> Donasi Gratis</label>
        </div>
        </div>

        <!-- Kondisi -->
        <div class="filter-section">
        <span class="filter-section-label">Kondisi Buku</span>
        <div class="filter-check-list">
            <label class="filter-check"><input type="checkbox" id="fcBaru"     onchange="applyFilters()"/> ✨ Seperti Baru</label>
            <label class="filter-check"><input type="checkbox" id="fcBaik"     onchange="applyFilters()"/> 👍 Cukup Baik</label>
            <label class="filter-check"><input type="checkbox" id="fcCoretan"  onchange="applyFilters()"/> ✏️ Ada Coretan</label>
            <label class="filter-check"><input type="checkbox" id="fcFotokopi" onchange="applyFilters()"/> 📄 Fotokopi</label>
        </div>
        </div>

        <!-- Rentang Harga -->
        <div class="filter-section">
        <span class="filter-section-label">Rentang Harga (Rp)</span>
        <div class="price-range-row">
            <input type="number" class="form-control" id="fPriceMin" placeholder="Min" oninput="applyFilters()"/>
            <span>—</span>
            <input type="number" class="form-control" id="fPriceMax" placeholder="Max" oninput="applyFilters()"/>
        </div>
        </div>

        <!-- Lokasi / Kampus -->
        <div class="filter-section">
        <span class="filter-section-label">Lokasi / Kampus</span>
        <input type="text" class="form-control" id="fLocation"
            placeholder="Cth: UNSOED, UGM..."
            oninput="applyFilters()"/>
        </div>
    </aside>

    <!-- ===== CATALOG MAIN ===== -->
    <main class="catalog-main">
        <div class="catalog-topbar">
        <div class="search-bar" style="flex:1;min-width:180px">
            <i class="fa fa-search"></i>
            <input type="text" id="fSearch"
            placeholder="Cari judul, penulis, atau dosen..."
            oninput="applyFilters()"/>
            <button class="search-btn" onclick="applyFilters()">Cari</button>
        </div>
        <div class="catalog-sort">
            <select id="fSort" onchange="applyFilters()">
            <option value="newest">Terbaru</option>
            <option value="price-asc">Harga Terendah</option>
            <option value="price-desc">Harga Tertinggi</option>
            <option value="cond">Kondisi Terbaik</option>
            <option value="alpha">A–Z</option>
            </select>
        </div>
        <button class="filter-toggle-btn" id="filterToggleBtn" onclick="toggleFilter()" title="Filter">
            <i class="fa fa-sliders-h"></i>
        </button>
        </div>

        <!-- Active filter chips -->
        <div class="active-filters" id="activeFilterChips"></div>

        <p class="results-count" id="resultsCount"></p>

        <div class="books-grid" id="catalogGrid"></div>

        <div class="pagination" id="pagination"></div>
    </main>
    </div>

    <div id="footerMount"></div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script>
    /* ===== MOUNT NAVBAR & FOOTER ===== */
    document.getElementById('navbarMount').innerHTML = buildNavbar('catalog', '../');
    document.getElementById('footerMount').innerHTML = buildFooter('../');

    /* ===== PAGINATION STATE ===== */
    let currentPage   = 1;
    const PER_PAGE    = 12;
    let filteredBooks = [...AppState.books];

    /* ===== READ URL PARAMS (from search / category links) ===== */
    window.addEventListener('DOMContentLoaded', () => {
    const p   = new URLSearchParams(window.location.search);
    const q   = p.get('q')   || '';
    const cat = p.get('cat') || '';
    if (q)   document.getElementById('fSearch').value   = q;
    if (cat) document.getElementById('fCategory').value = cat;
    applyFilters();
    });

    /* ===== FILTER LOGIC ===== */
    function applyFilters() {
    const q        = document.getElementById('fSearch').value.toLowerCase().trim();
    const cat      = document.getElementById('fCategory').value;
    const course   = document.getElementById('fCourse').value.toLowerCase().trim();
    const loc      = document.getElementById('fLocation').value.toLowerCase().trim();
    const pMin     = parseInt(document.getElementById('fPriceMin').value) || 0;
    const pMax     = parseInt(document.getElementById('fPriceMax').value) || Infinity;
    const sort     = document.getElementById('fSort').value;

    const types = [];
    if (document.getElementById('fcJual').checked)   types.push('Dijual');
    if (document.getElementById('fcTukar').checked)  types.push('Ditukar');
    if (document.getElementById('fcDonasi').checked) types.push('Donasi');

    const conds = [];
    if (document.getElementById('fcBaru').checked)     conds.push('Seperti Baru');
    if (document.getElementById('fcBaik').checked)     conds.push('Cukup Baik');
    if (document.getElementById('fcCoretan').checked)  conds.push('Ada Coretan');
    if (document.getElementById('fcFotokopi').checked) conds.push('Fotokopi');

    filteredBooks = AppState.books.filter(b => {
        const matchQ   = !q || [b.title,b.author,b.course,b.lecturer].some(s => s.toLowerCase().includes(q));
        const matchCat = !cat || b.category === cat;
        const matchCrs = !course || b.course.toLowerCase().includes(course) || (b.lecturer||'').toLowerCase().includes(course);
        const matchLoc = !loc  || b.location.toLowerCase().includes(loc);
        const matchTyp = types.length === 0 || types.includes(b.type);
        const matchCnd = conds.length === 0 || conds.includes(b.condition);
        const matchP   = b.type !== 'Dijual' || (b.price >= pMin && b.price <= pMax);
        return matchQ && matchCat && matchCrs && matchLoc && matchTyp && matchCnd && matchP;
    });

    /* Sort */
    const condOrd = {'Seperti Baru':1,'Cukup Baik':2,'Ada Coretan':3,'Fotokopi':4};
    if      (sort === 'price-asc')  filteredBooks.sort((a,b) => a.price - b.price);
    else if (sort === 'price-desc') filteredBooks.sort((a,b) => b.price - a.price);
    else if (sort === 'cond')       filteredBooks.sort((a,b) => (condOrd[a.condition]||5)-(condOrd[b.condition]||5));
    else if (sort === 'alpha')      filteredBooks.sort((a,b) => a.title.localeCompare(b.title));
    else                            filteredBooks.sort((a,b) => b.id - a.id);

    currentPage = 1;
    renderPage();
    renderActiveChips();
    }

    function renderPage() {
    const grid  = document.getElementById('catalogGrid');
    const total = filteredBooks.length;
    const start = (currentPage - 1) * PER_PAGE;
    const slice = filteredBooks.slice(start, start + PER_PAGE);

    document.getElementById('resultsCount').textContent =
        `Menampilkan ${slice.length} dari ${total} buku`;

    if (slice.length === 0) {
        grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
            <span class="empty-icon">🔍</span>
            <p>Tidak ada buku yang cocok dengan filter kamu.</p>
            <button class="btn-outline sm" onclick="resetFilters()">Reset Filter</button>
        </div>`;
    } else {
        grid.innerHTML = slice.map(b => buildBookCard(b, '')).join('');
    }

    /* Pagination */
    const totalPages = Math.ceil(total / PER_PAGE);
    let pgHTML = '';
    if (totalPages > 1) {
        if (currentPage > 1) pgHTML += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
        for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
            pgHTML += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
        } else if (Math.abs(i - currentPage) === 2) {
            pgHTML += `<button class="page-btn" disabled style="border:none;background:none">…</button>`;
        }
        }
        if (currentPage < totalPages) pgHTML += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
    }
    document.getElementById('pagination').innerHTML = pgHTML;
    }

    function goPage(n) {
    currentPage = n;
    renderPage();
    document.querySelector('.catalog-main').scrollTo({ top:0, behavior:'smooth' });
    window.scrollTo({ top: 66, behavior:'smooth' });
    }

    function resetFilters() {
    ['fSearch','fCourse','fLocation','fPriceMin','fPriceMax'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    document.getElementById('fCategory').value = '';
    document.getElementById('fSort').value     = 'newest';
    ['fcJual','fcTukar','fcDonasi','fcBaru','fcBaik','fcCoretan','fcFotokopi'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.checked = false;
    });
    applyFilters();
    }

    function renderActiveChips() {
    const chips = [];
    const q   = document.getElementById('fSearch').value.trim();
    const cat = document.getElementById('fCategory').value;
    const crs = document.getElementById('fCourse').value.trim();
    if (q)   chips.push({ label: `"${q}"`,       clear: () => { document.getElementById('fSearch').value=''; applyFilters(); } });
    if (cat) chips.push({ label: cat,             clear: () => { document.getElementById('fCategory').value=''; applyFilters(); } });
    if (crs) chips.push({ label: crs,             clear: () => { document.getElementById('fCourse').value=''; applyFilters(); } });

    ['fcJual','fcTukar','fcDonasi'].forEach(id => {
        if (document.getElementById(id)?.checked) {
        const lbl = {fcJual:'Dijual',fcTukar:'Ditukar',fcDonasi:'Donasi'}[id];
        chips.push({ label: lbl, clear: () => { document.getElementById(id).checked=false; applyFilters(); } });
        }
    });

    const wrap = document.getElementById('activeFilterChips');
    wrap.innerHTML = chips.map((c,i) =>
        `<span class="filter-chip" onclick="clearChip(${i})">✕ ${c.label}</span>`
    ).join('');
    wrap._chips = chips;
    }

    function clearChip(i) {
    document.getElementById('activeFilterChips')._chips[i]?.clear();
    }

    function toggleFilter() {
    document.getElementById('filterPanel').classList.toggle('open');
    }
    </script>
    </body>
    </html>
