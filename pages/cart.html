    <!DOCTYPE html>
    <html lang="id">
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Keranjang - BookCircle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../css/main.css"/>
    <link rel="stylesheet" href="../css/components.css"/>
    <link rel="stylesheet" href="../css/pages.css"/>
    <style>
        /* Overlay untuk pop-up checkout berhasil */
        .success-overlay {
        position:fixed; inset:0; background:rgba(0,5,0,.5); backdrop-filter:blur(6px);
        z-index:999; display:none; align-items:center; justify-content:center;
        }
        .success-overlay.show { display:flex; }
        .success-card {
        background:var(--snow); border-radius:var(--r-2xl);
        padding:48px 40px; text-align:center; max-width:400px; width:90%;
        animation:scaleIn .3s var(--ease);
        }
        .success-icon { font-size:4rem; margin-bottom:16px; display:inline-block; }
    </style>
    </head>
    <body>
    
    <!-- NAVBAR -->
    <div id="navbarMount"></div>

    <!-- KONTEN UTAMA -->
    <div class="cart-wrapper">
        <div class="page-topbar">
        <button class="back-btn" onclick="history.back()"><i class="fa fa-arrow-left"></i></button>
        <h1>Keranjang Saya</h1>
        </div>

        <!-- Area grid keranjang (Kiri: daftar buku, Kanan: ringkasan harga) -->
        <div class="cart-grid" id="cartGrid">
        
        <!-- Daftar Item (diisi lewat JS) -->
        <div id="cartItemsContainer"></div>

        <!-- Ringkasan Belanja (diisi lewat JS) -->
        <div id="cartSummaryContainer"></div>

        </div>
    </div>

    <!-- FOOTER -->
    <div id="footerMount"></div>

    <!-- POP-UP CHECKOUT BERHASIL -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
        <div class="success-icon" style="color:#1B6B3A"><i class="fa-solid fa-circle-check"></i></div>
        <h2 style="margin-bottom:10px">Pesanan Diproses!</h2>
        <p style="color:var(--taupe);margin-bottom:28px">Silakan hubungi penjual via fitur pesan di Dashboard untuk mengatur pembayaran dan pengiriman.</p>
        <div style="display:flex;flex-direction:column;gap:10px">
            <a href="dashboard.html" class="btn-primary full lg">Lihat Pesanan di Dashboard</a>
            <a href="catalog.html" class="btn-outline full">Kembali Belanja</a>
        </div>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // 1. Cek apakah user sudah login, jika belum arahkan ke login
        if (!Auth.check()) {
        window.location.href = 'login.html?redirect=cart.html';
        }

        // 2. Mount Navbar & Footer (menggunakan argumen '../' karena ada di folder pages)
        document.getElementById('navbarMount').innerHTML = buildNavbar('cart', '../');
        document.getElementById('footerMount').innerHTML = buildFooter('../');

        // 3. Fungsi Render Keranjang
        function renderCart() {
        const itemsContainer = document.getElementById('cartItemsContainer');
        const summaryContainer = document.getElementById('cartSummaryContainer');
        const cart = AppState.cart;

        // Jika keranjang kosong
        if (cart.length === 0) {
            itemsContainer.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1; background:var(--snow); border:1.5px solid var(--border); border-radius:var(--r-xl); padding: 80px 20px;">
                <span class="empty-icon" style="font-size:4rem; color:var(--taupe); opacity:0.5;"><i class="fa-solid fa-basket-shopping"></i></span>
                <h3 style="margin-bottom:8px;">Keranjangmu masih kosong</h3>
                <p style="margin-bottom:24px; color:var(--taupe);">Yuk, cari buku atau catatan kuliah yang kamu butuhkan!</p>
                <a href="catalog.html" class="btn-primary">Belanja Sekarang</a>
            </div>
            `;
            // Kosongkan kolom kanan (ringkasan) jika keranjang kosong
            summaryContainer.innerHTML = '';
            document.getElementById('cartGrid').style.gridTemplateColumns = '1fr'; // Buat 1 kolom penuh
            return;
        }

        // Pastikan grid 2 kolom kembali jika ada isi
        if (window.innerWidth > 768) {
            document.getElementById('cartGrid').style.gridTemplateColumns = '1fr 300px';
        }

        // Render Item Buku
        let itemsHTML = '';
        let totalHarga = 0;
        let totalItemsBayar = 0;

        cart.forEach(book => {
            let hargaTampil = '';
            if (book.type === 'Donasi') {
            hargaTampil = '<span style="color:#1B6B3A">Gratis</span>';
            } else if (book.type === 'Ditukar') {
            hargaTampil = '<span style="color:var(--taupe)">Ditukar</span>';
            } else {
            hargaTampil = 'Rp ' + book.price.toLocaleString('id-ID');
            totalHarga += book.price;
            totalItemsBayar++;
            }

            itemsHTML += `
            <div class="cart-item">
                <div class="cart-book-cover" style="background:${book.clr}">
                <span style="color:${book.tcl}">${book.title.substring(0, 15)}...</span>
                </div>
                <div class="cart-item-info">
                <h4>${book.title}</h4>
                <p>Dari ${book.seller} &bull; ${book.condition}</p>
                <div class="cart-item-price">${hargaTampil}</div>
                </div>
                <button class="cart-item-del" onclick="removeFromCart(${book.id})" title="Hapus dari keranjang">
                <i class="fa fa-trash"></i>
                </button>
            </div>
            `;
        });
        itemsContainer.innerHTML = itemsHTML;

        // Render Ringkasan Belanja
        summaryContainer.innerHTML = `
            <div class="summary-card">
            <h3>Ringkasan Belanja</h3>
            <div class="summary-row">
                <span>Total Barang (${cart.length})</span>
                <span>Rp ${totalHarga.toLocaleString('id-ID')}</span>
            </div>
            <div class="summary-row">
                <span>Biaya Layanan</span>
                <span style="color:#1B6B3A; font-weight:700;">Gratis</span>
            </div>
            <div class="summary-total">
                <span>Total Harga</span>
                <span>Rp ${totalHarga.toLocaleString('id-ID')}</span>
            </div>
            <button class="btn-primary full lg" style="margin-top:24px" onclick="doCheckout()">
                <i class="fa fa-check-circle"></i> Proses Sekarang
            </button>
            </div>
        `;
        }

        // 4. Fungsi Hapus dari Keranjang
        function removeFromCart(id) {
        const idx = AppState.cart.findIndex(b => b.id === id);
        if (idx > -1) {
            AppState.cart.splice(idx, 1);
            AppState.save();
            updateBadges(); // Fungsi global dari data.js untuk update icon navbar
            renderCart();   // Refresh tampilan keranjang
            showToast('<i class="fa-solid fa-trash-can"></i> Item dihapus dari keranjang');
        }
        }

        // 5. Fungsi Checkout (Simulasi Pemesanan)
        function doCheckout() {
        if (AppState.cart.length === 0) return;
        
        // Di sini idealnya data dipindah ke daftar pesanan di Dashboard.
        // Untuk simulasi, kita cukup kosongkan keranjang:
        AppState.cart = [];
        AppState.save();
        updateBadges();
        
        // Tampilkan popup sukses
        document.getElementById('successOverlay').classList.add('show');
        }

        // Panggil render pertama kali saat halaman dimuat
        renderCart();

    </script>
    </body>
    </html>
