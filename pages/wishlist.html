    <!DOCTYPE html>
    <html lang="id">
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Wishlist & Permintaan Buku — BookCircle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../css/main.css"/>
    <link rel="stylesheet" href="../css/components.css"/>
    <link rel="stylesheet" href="../css/pages.css"/>
    <style>
        /* Style Tambahan untuk Modal Pasang Permintaan */
        .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0, 5, 0, 0.5);
        backdrop-filter: blur(4px);
        display: none; align-items: center; justify-content: center;
        z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal-card {
        background: var(--snow); padding: 32px;
        border-radius: var(--r-xl); width: 90%; max-width: 460px;
        box-shadow: var(--shadow-xl); animation: scaleIn 0.3s var(--ease);
        }
        .modal-card h3 { margin-bottom: 20px; font-size: 1.3rem; color: var(--coffee); }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .wishlist-right { display: flex; flex-direction: column; gap: 20px; }
    </style>
    </head>
    <body>

    <div id="navbarMount"></div>

    <div class="wishlist-wrapper">
        <div class="page-topbar">
        <button class="back-btn" onclick="history.back()"><i class="fa fa-arrow-left"></i></button>
        <h1>Wishlist & Permintaan</h1>
        </div>

        <div class="wishlist-grid">
        
        <div class="wishlist-left">
            <h3 style="font-size: 1.2rem; margin-bottom: 20px;"><i class="fa-solid fa-heart" style="color:#e74c3c"></i> Buku Tersimpan</h3>
            <div class="books-grid" id="wishlistGrid"></div>
        </div>

        <div class="wishlist-right">
            <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="font-size: 1.2rem;"><i class="fa-solid fa-bullhorn"></i> Wishlist Komunitas</h3>
            <button class="btn-primary sm" onclick="toggleModal(true)">
                <i class="fa fa-plus"></i> Pasang
            </button>
            </div>
            
            <div id="requestsListContainer"></div>
        </div>

        </div>
    </div>

    <div id="footerMount"></div>

    <div class="modal-overlay" id="requestModal">
        <div class="modal-card">
        <h3>Pasang Permintaan Buku</h3>
        <div class="form-group">
            <label class="form-label">Judul Buku / Catatan *</label>
            <input type="text" id="reqTitle" class="form-control" placeholder="Cth: Kalkulus Stewart Edisi 9"/>
        </div>
        <div class="form-group">
            <label class="form-label">Mata Kuliah *</label>
            <input type="text" id="reqCourse" class="form-control" placeholder="Cth: Kalkulus 2"/>
        </div>
        <div class="form-group">
            <label class="form-label">Budget Perkiraan (Rp) *</label>
            <input type="number" id="reqBudget" class="form-control" placeholder="Cth: 80000 (Isi 0 jika butuh donasi)"/>
        </div>
        <div class="form-group">
            <label class="form-label">Catatan Tambahan</label>
            <textarea id="reqNote" class="form-control" rows="3" placeholder="Cth: Butuh cepat untuk persiapan UTS minggu depan!"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-outline sm" onclick="toggleModal(false)">Batal</button>
            <button class="btn-primary sm" onclick="submitRequest()">Publikasikan</button>
        </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // Proteksi Halaman: Wajib Login
        if (!Auth.check()) {
        window.location.href = 'login.html?redirect=wishlist.html';
        }

        // Mount Navbar & Footer dengan prefix mundur '../'
        document.getElementById('navbarMount').innerHTML = buildNavbar('wishlist', '../');
        document.getElementById('footerMount').innerHTML = buildFooter('../');

        // 1. Render Fungsi Sisi Kiri (Buku Yang Disimpan)
        function renderWishlist() {
        const grid = document.getElementById('wishlistGrid');
        const wishlist = AppState.wishlist;

        if (wishlist.length === 0) {
            grid.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1; padding: 40px 0; text-align: center; color: var(--taupe);">
                <i class="fa-regular fa-heart" style="font-size: 3rem; display: block; margin-bottom: 10px; opacity:0.4"></i>
                <p>Belum ada buku yang kamu simpan ke wishlist.</p>
                <a href="catalog.html" class="btn-outline sm" style="margin-top: 10px;">Jelajahi Katalog</a>
            </div>`;
            return;
        }

        // Render menggunakan fungsi bawaan buildBookCard dari data.js
        grid.innerHTML = wishlist.map(book => buildBookCard(book, '../')).join('');
        }

        // 2. Render Fungsi Sisi Kanan (Daftar Permintaan Komunitas)
        function renderRequests() {
        const container = document.getElementById('requestsListContainer');
        
        // Menggabungkan request statis dan request dinamis milik user dari localStorage
        const allRequests = [...AppState.myRequests, ...SAMPLE_REQUESTS];

        if (allRequests.length === 0) {
            container.innerHTML = '<p style="color:var(--taupe); text-align:center; padding:20px;">Belum ada permintaan buku.</p>';
            return;
        }

        container.innerHTML = allRequests.map(req => {
            const budgetText = req.budget === 0 ? '<i class="fa-solid fa-gift"></i> Gratis / Donasi' : `Rp ${req.budget.toLocaleString('id-ID')}`;
            return `
            <div class="request-item">
                <div class="request-item-icon"><i class="fa-solid fa-clipboard-question"></i></div>
                <div class="request-item-info">
                <h4>${req.title}</h4>
                <span>Matkul: ${req.course}</span><br/>
                <span style="font-style: italic; color: var(--text-secondary); font-size: 0.85rem;">"${req.note}"</span><br/>
                <span style="font-size: 0.72rem; color: var(--taupe-light);">Oleh ${req.by} &bull; ${req.time}</span>
                </div>
                <div class="request-item-budget">${budgetText}</div>
            </div>
            `;
        }).join('');
        }

        // 3. Kontrol Modal Pop-up
        function toggleModal(show) {
        const modal = document.getElementById('requestModal');
        if (show) modal.classList.add('show');
        else modal.classList.remove('show');
        }

        // 4. Submit Permintaan Baru Ke Komunitas
        function submitRequest() {
        const title = document.getElementById('reqTitle').value.trim();
        const course = document.getElementById('reqCourse').value.trim();
        const budget = parseInt(document.getElementById('reqBudget').value) || 0;
        const note = document.getElementById('reqNote').value.trim() || 'Tidak ada catatan tambahan.';

        if (!title || !course) {
            showToast('⚠️ Judul buku dan mata kuliah wajib diisi!');
            return;
        }

        const newRequest = {
            id: Date.now(),
            title,
            course,
            budget,
            note,
            by: AppState.user?.name || 'Mahasiswa',
            time: 'Baru saja'
        };

        // Simpan ke state global aplikasi
        AppState.myRequests.unshift(newRequest);
        AppState.save();

        // Reset Form & Tutup Modal
        document.getElementById('reqTitle').value = '';
        document.getElementById('reqCourse').value = '';
        document.getElementById('reqBudget').value = '';
        document.getElementById('reqNote').value = '';
        toggleModal(false);

        // Refresh tampilan sisi kanan dan beri feedback toast
        renderRequests();
        showToast('🎉 Permintaanmu berhasil dipublikasikan!');
        }

        // 5. Interseptor Otomatis: Jika user menghapus item wishlist langsung dari halaman ini
        document.getElementById('wishlistGrid').addEventListener('click', (e) => {
        if (e.target.closest('.card-wish-btn')) {
            // Beri sedikit jeda waktu agar fungsi internal handleWishToggle selesai memproses data
            setTimeout(renderWishlist, 150);
        }
        });

        // Jalankan render awal saat halaman dimuat
        renderWishlist();
        renderRequests();
    </script>
    </body>
    </html>
