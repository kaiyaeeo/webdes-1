    <!DOCTYPE html>
    <html lang="id">
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Detail Buku — BookCircle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../css/main.css"/>
    <link rel="stylesheet" href="../css/components.css"/>
    <link rel="stylesheet" href="../css/pages.css"/>
    <style>
        /* Related grid scrollable on mobile */
        .related-scroll {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 18px;
        }
        /* Thumb gallery */
        .thumb-row { display:flex; gap:10px; margin-top:14px; justify-content:center; flex-wrap:wrap; }
        .thumb {
        width:58px; height:74px; border-radius:4px 8px 8px 4px;
        cursor:pointer; border:2px solid transparent;
        display:flex; align-items:center; justify-content:center;
        padding:6px; box-shadow: var(--shadow-sm);
        transition:all var(--t-fast);
        }
        .thumb.active { border-color:var(--coffee); }
        .thumb:hover  { transform:translateY(-2px); box-shadow:var(--shadow-md); }
        .thumb span   { font-family:'Playfair Display',serif; font-size:0.55rem; font-weight:800; text-align:center; }
        /* Chat panel (inline) */
        #chatPanel { margin-top:28px; }
    </style>
    </head>
    <body>

    <div id="navbarMount"></div>

    <div class="detail-wrapper" id="detailWrapper">
    <!-- Content injected by JS -->
    <div style="text-align:center;padding:80px 0;color:var(--taupe)">
        <i class="fa fa-spinner fa-spin" style="font-size:2rem"></i>
        <p style="margin-top:12px">Memuat detail buku...</p>
    </div>
    </div>

    <div id="footerMount"></div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script>
    document.getElementById('navbarMount').innerHTML = buildNavbar('catalog', '../');
    document.getElementById('footerMount').innerHTML = buildFooter('../');

    /* ===== LOAD BOOK ===== */
    const bookId = +getParam('id');
    const openChat = getParam('chat') === '1';

    const book = AppState.books.find(b => b.id === bookId);

    if (!book) {
    document.getElementById('detailWrapper').innerHTML = `
        <div style="text-align:center;padding:80px 24px;color:var(--taupe)">
        <span style="font-size:4rem;display:block;margin-bottom:16px">📭</span>
        <h2 style="margin-bottom:10px">Buku tidak ditemukan</h2>
        <p style="margin-bottom:24px">Listing mungkin sudah dihapus atau link tidak valid.</p>
        <a href="catalog.html" class="btn-primary">Kembali ke Katalog</a>
        </div>`;
    } else {
    document.title = book.title + ' — BookCircle';
    renderDetail(book);
    if (openChat) setTimeout(() => openChatPanel(book.id), 400);
    }

    function renderDetail(b) {
    const inWish = AppState.wishlist.some(w => w.id === b.id);
    const related = AppState.books.filter(x => x.id !== b.id && (x.category === b.category || x.course === b.course)).slice(0,4);

    /* Price display */
    let priceHTML, actionLabel;
    if (b.type === 'Donasi')  { priceHTML = '<span class="detail-price free">🎁 Gratis / Donasi</span>';  actionLabel = 'Ambil Gratis'; }
    else if (b.type === 'Ditukar') { priceHTML = '<span class="detail-price swap">🔄 Ditukar</span>'; actionLabel = 'Ajukan Tukar'; }
    else                      { priceHTML = `<span class="detail-price">Rp ${b.price.toLocaleString('id-ID')}</span>`; actionLabel = 'Tambah Keranjang'; }
    
    document.getElementById('detailWrapper').innerHTML = `

        <!-- BREADCRUMB + BACK -->
        <div class="page-topbar" style="margin-bottom:16px">
        <button class="back-btn" onclick="history.back()"><i class="fa fa-arrow-left"></i></button>
        <nav style="font-size:0.8rem;color:var(--taupe);display:flex;gap:6px;align-items:center">
            <a href="catalog.html" style="color:var(--taupe)">Katalog</a>
            <span>›</span>
            <a href="catalog.html?cat=${encodeURIComponent(b.category)}" style="color:var(--taupe)">${b.category}</a>
            <span>›</span>
            <span style="color:var(--text-primary);font-weight:600">${b.title}</span>
        </nav>
        </div>

        <!-- MAIN DETAIL GRID -->
        <div class="detail-grid">

        <!-- Cover panel -->
        <div class="detail-cover-panel">
            <div>
            <div class="detail-big-cover" id="mainCover" style="background:${b.clr}">
                <span style="color:${b.tcl};font-size:0.95rem">${b.title}</span>
            </div>

            <!-- Thumbnail row (simulasi 3 view) -->
            <div class="thumb-row">
                <div class="thumb active" style="background:${b.clr}" onclick="selectThumb(this,'${b.clr}')">
                <span style="color:${b.tcl}">Cover</span>
                </div>
                <div class="thumb" style="background:${b.clr}cc" onclick="selectThumb(this,'${b.clr}cc')">
                <span style="color:${b.tcl}">Isi</span>
                </div>
                <div class="thumb" style="background:${b.clr}88" onclick="selectThumb(this,'${b.clr}88')">
                <span style="color:${b.tcl}">Halaman</span>
                </div>
            </div>
            </div>
        </div>

        <!-- Info panel -->
        <div class="detail-info">

            <div>
            <span class="detail-category-badge">${b.category}</span>
            <span style="color:var(--taupe);font-size:0.8rem"> · ${b.course}</span>
            </div>

            <h1 class="detail-title">${b.title}</h1>
            <p class="detail-author">oleh <strong>${b.author}</strong></p>

            <!-- Tags -->
            <div class="detail-tags">
            <span class="detail-tag cond-pill ${condClass(b.condition)}">${b.condition}</span>
            <span class="detail-tag">${b.location}</span>
            ${b.lecturer ? `<span class="detail-tag">👨‍🏫 ${b.lecturer}</span>` : ''}
            <span class="detail-tag ${typeBadgeClass(b.type)}" style="border:none">${b.type}</span>
            </div>

            <!-- Price -->
            <div class="detail-price-row">
            ${priceHTML}
            ${b.type === 'Dijual' && b.price < 100000 ? `<span style="font-size:0.78rem;color:var(--taupe);background:var(--almond-light);padding:4px 10px;border-radius:6px;font-weight:600">💡 Bisa nego</span>` : ''}
            </div>

            <!-- Seller card -->
            <div class="detail-seller-card">
            <img src="${avatarUrl(b.seller)}" alt="${b.seller}"/>
            <div style="flex:1">
                <span class="detail-seller-name">${b.seller}</span>
                <span class="detail-seller-meta">⭐ 4.8 · ${b.location} · <span style="color:#1B6B3A;font-weight:600">Aktif</span></span>
            </div>
            <button class="btn-ghost sm" onclick="openChatPanel(${b.id})">
                <i class="fa fa-comment-dots"></i> Chat
            </button>
            </div>

            <!-- Description -->
            <div class="panel panel-sm" style="background:var(--almond-light);border-color:var(--border)">
            <p style="font-size:0.82rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Deskripsi</p>
            <p class="detail-description">${b.desc}</p>
            </div>

            <!-- Action buttons -->
            <div class="detail-actions">
            <button class="btn-primary lg" onclick="addToCart(${b.id})">
                <i class="fa fa-shopping-bag"></i> ${actionLabel}
            </button>
            <button class="btn-outline lg" onclick="openChatPanel(${b.id})">
                <i class="fa fa-comments"></i> Chat Penjual
            </button>
            <button class="btn-icon" id="wishBtn" style="width:48px;height:48px"
                onclick="toggleWish(${b.id}, this)" title="${inWish?'Hapus dari Wishlist':'Tambah ke Wishlist'}">
                ${inWish ? '❤️' : '🤍'}
            </button>
            </div>

            <!-- Share -->
            <div style="display:flex;align-items:center;gap:12px;padding-top:4px;border-top:1px solid var(--border)">
            <span style="font-size:0.8rem;color:var(--taupe)">Bagikan:</span>
            <button class="btn-ghost sm" onclick="shareBook()"><i class="fab fa-whatsapp" style="color:#25D366"></i> WA</button>
            <button class="btn-ghost sm" onclick="copyLink()"><i class="fa fa-link"></i> Salin Link</button>
            </div>

        </div>
        </div>

        <!-- ===== INLINE CHAT PANEL ===== -->
        <div id="chatPanel" class="hidden" style="margin-top:32px;max-width:520px">
        <h3 style="margin-bottom:14px;font-size:1.1rem">💬 Chat dengan Penjual</h3>
        <div class="chat-wrap">
            <div class="chat-head">
            <img id="chatSellerAvatar" src="" alt=""/>
            <div>
                <h4 id="chatSellerName"></h4>
                <span id="chatBookLabel"></span>
            </div>
            <button class="btn-ghost" onclick="closeChatPanel()" style="margin-left:auto;color:var(--almond)">
                <i class="fa fa-times"></i>
            </button>
            </div>
            <div class="chat-body" id="chatMessages"></div>
            <div class="chat-foot">
            <input type="text" id="chatInput" placeholder="Ketik pesan..." onkeydown="if(event.key==='Enter')sendChat()"/>
            <button onclick="sendChat()"><i class="fa fa-paper-plane"></i></button>
            </div>
        </div>
        </div>

        <!-- ===== RELATED BOOKS ===== -->
        ${related.length > 0 ? `
        <div style="margin-top:56px">
        <div class="section-header" style="margin-bottom:24px">
            <h2 style="font-size:1.4rem">Buku <em>Serupa</em></h2>
            <a href="catalog.html?cat=${encodeURIComponent(b.category)}" class="see-all">Lihat semua →</a>
        </div>
        <div class="related-scroll">
            ${related.map(rb => buildBookCard(rb, '')).join('')}
        </div>
        </div>` : ''}

    `;
    }

    /* ===== ACTIONS ===== */
    function addToCart(id) {
    if (!Auth.check()) { window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }
    if (AppState.cart.some(c => c.id === id)) { showToast('📚 Sudah ada di keranjang!'); return; }
    const book = AppState.books.find(b => b.id === id);
    AppState.cart.push(book);
    AppState.save();
    updateBadges();
    showToast('🛍️ Ditambahkan ke keranjang!');
    }

    function toggleWish(id, btn) {
    if (!Auth.check()) { window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }
    const idx = AppState.wishlist.findIndex(w => w.id === id);
    if (idx > -1) {
        AppState.wishlist.splice(idx, 1);
        btn.textContent = '🤍';
        btn.title = 'Tambah ke Wishlist';
        showToast('💔 Dihapus dari wishlist.');
    } else {
        AppState.wishlist.push(AppState.books.find(b => b.id === id));
        btn.textContent = '❤️';
        btn.title = 'Hapus dari Wishlist';
        showToast('❤️ Disimpan ke wishlist!');
    }
    AppState.save();
    updateBadges();
    }

    function selectThumb(el, bg) {
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('mainCover').style.background = bg;
    }

    function shareBook() {
    const url = window.location.href;
    const text = `Cek buku "${book.title}" di BookCircle: ${url}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => showToast('🔗 Link disalin!'));
    }
    </script>
    </body>
    </html>
