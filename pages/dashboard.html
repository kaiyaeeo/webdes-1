    <!DOCTYPE html>
    <html lang="id">
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard — BookCircle</title>
    <link rel="stylesheet" href="../css/main.css"/>
    <link rel="stylesheet" href="../css/components.css"/>
    <link rel="stylesheet" href="../css/pages.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        .dash-layout{display:flex;min-height:100vh;padding-top:66px}
        .dash-side{
        width:250px;min-width:250px;background:var(--coffee);
        display:flex;flex-direction:column;padding:24px 14px;gap:6px;
        position:sticky;top:66px;height:calc(100vh - 66px);overflow-y:auto;
        }
        .dash-profile{
        display:flex;align-items:center;gap:11px;padding:14px;
        background:rgba(255,255,255,.07);border-radius:var(--r-md);margin-bottom:6px;
        }
        .dash-profile img{width:42px;height:42px;border-radius:50%;border:2px solid var(--almond-mid)}
        .dash-profile h4{font-size:.88rem;color:var(--snow);font-family:'DM Sans',sans-serif;font-weight:600;line-height:1.3}
        .dash-profile p{font-size:.72rem;color:rgba(255,251,255,.5);margin-top:1px}
        .dash-nav-link{
        display:flex;align-items:center;gap:10px;
        padding:10px 13px;border-radius:9px;font-size:.87rem;font-weight:500;
        color:rgba(255,251,255,.6);transition:var(--ease);cursor:pointer;border:none;
        background:none;font-family:'DM Sans',sans-serif;text-align:left;width:100%;
        }
        .dash-nav-link i{width:16px;flex-shrink:0}
        .dash-nav-link:hover,.dash-nav-link.active{background:rgba(255,255,255,.1);color:var(--snow)}
        .dash-logout{
        margin-top:auto;padding:10px 13px;border-radius:9px;
        color:rgba(255,251,255,.45);font-size:.83rem;font-weight:500;
        border:1px solid rgba(255,255,255,.12);background:none;cursor:pointer;
        font-family:'DM Sans',sans-serif;transition:var(--ease);
        }
        .dash-logout:hover{background:rgba(255,0,0,.12);color:#ff9999}

        .dash-main{flex:1;padding:32px;overflow-y:auto;background:var(--almond-light)}
        .dash-title{font-size:1.5rem;margin-bottom:24px}
        .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:28px}
        .stat-card{background:var(--snow);border:1.5px solid var(--border);border-radius:var(--r-md);padding:18px}
        .stat-card .ico{font-size:1.4rem;margin-bottom:7px}
        .stat-card .num{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:900;color:var(--coffee)}
        .stat-card .lbl{font-size:.74rem;color:var(--taupe);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
        .quick-actions{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
        .activity-list{display:flex;flex-direction:column;gap:10px}
        .act-item{
        display:flex;align-items:center;gap:13px;
        padding:13px 15px;background:var(--snow);
        border:1.5px solid var(--border);border-radius:var(--r-md);
        }
        .act-item .act-ico{font-size:1.3rem}
        .act-item .act-text{flex:1;font-size:.88rem;font-weight:500}
        .act-item .act-time{font-size:.75rem;color:var(--taupe)}
        .status-pill{padding:3px 9px;border-radius:5px;font-size:.72rem;font-weight:700;}
        .s-baru{background:#d4edda;color:#155724}
        .s-proses{background:#cce5ff;color:#004085}
        .s-selesai{background:#e2e3e5;color:#383d41}

        .order-row{
        display:flex;align-items:center;gap:14px;
        padding:14px 16px;background:var(--snow);border:1.5px solid var(--border);
        border-radius:var(--r-md);margin-bottom:10px;
        }
        .order-bk{width:50px;height:66px;border-radius:3px 8px 8px 3px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
        .order-info{flex:1}
        .order-info strong{display:block;font-size:.9rem}
        .order-info span{font-size:.78rem;color:var(--taupe)}

        .msg-list{display:flex;flex-direction:column;gap:10px}
        .msg-row{
        display:flex;align-items:center;gap:13px;padding:13px 15px;
        background:var(--snow);border:1.5px solid var(--border);border-radius:var(--r-md);
        cursor:pointer;transition:var(--ease);
        }
        .msg-row:hover{background:var(--almond-light)}
        .msg-row img{width:40px;height:40px;border-radius:50%}
        .msg-info{flex:1}
        .msg-info strong{display:block;font-size:.88rem}
        .msg-info span{font-size:.78rem;color:var(--taupe)}
        .msg-time{font-size:.73rem;color:var(--taupe)}

        .book-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        }

        @media(max-width:860px){
        .dash-layout{flex-direction:column}
        .dash-side{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;padding:14px;gap:4px}
        .dash-profile{width:100%}
        .dash-nav-link{font-size:.8rem;padding:8px 10px}
        .dash-logout{margin-top:0;width:100%}
        .dash-main{padding:20px 16px}
        }
    </style>
    </head>
    <body>

    <div id="navbarMount"></div>

    <div class="dash-layout">
        <aside class="dash-side" id="dashSide">
        <div class="dash-profile" id="dashProfile"></div>
        <button class="dash-nav-link active" onclick="switchTab('overview',this)"><i class="fa fa-th-large"></i> Overview</button>
        <button class="dash-nav-link" onclick="switchTab('listings',this)"><i class="fa fa-book"></i> Listinganku</button>
        <button class="dash-nav-link" onclick="switchTab('orders',this)"><i class="fa fa-box"></i> Pesanan</button>
        <button class="dash-nav-link" onclick="switchTab('wishlist',this)"><i class="fa fa-heart"></i> Wishlist</button>
        <button class="dash-nav-link" onclick="switchTab('messages',this)"><i class="fa fa-comments"></i> Pesan</button>
        <button class="dash-nav-link" onclick="switchTab('profile',this)"><i class="fa fa-user"></i> Profil</button>
        <button class="dash-logout" onclick="doLogout()"><i class="fa fa-sign-out-alt"></i> Keluar</button>
        </aside>

        <main class="dash-main" id="dashMain">
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // Guard: Ambil status dari library Auth internal
        if (!Auth.check()) {
        window.location.href = 'login.html?redirect=dashboard.html';
        }

        // Suntik komponen Navbar dinamis bawaan sistem
        document.getElementById('navbarMount').innerHTML = buildNavbar('dashboard', '../');

        document.addEventListener('DOMContentLoaded', () => {
        const u = AppState.user;
        if (!u) return;
        
        document.getElementById('dashProfile').innerHTML = `
            <img src="${avatarUrl(u.name)}" alt="${u.name}"/>
            <div><h4>${u.name}</h4><p>${u.email}</p></div>
        `;
        renderTab('overview');
        });

        function switchTab(tab, btn) {
        document.querySelectorAll('.dash-nav-link').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTab(tab);
        }

        function renderTab(tab) {
        const el = document.getElementById('dashMain');
        const u = AppState.user;
        if (!u) return;

        // Ambil data langsung dari variabel AppState global di data.js
        const cart = AppState.cart;
        const wish = AppState.wishlist;
        const reqs = AppState.myRequests;
        const ownBooks = AppState.books.filter(b => b.isOwn);

        if (tab === 'overview') {
            el.innerHTML = `
            <h2 class="dash-title">Selamat Datang, <em>${u.name.split(' ')[0]}</em> ✦</h2>
            <div class="stat-grid">
                <div class="stat-card"><div class="ico" style="color:var(--coffee)"><i class="fa-solid fa-book-bookmark"></i></div>...</div>
                <div class="stat-card"><div class="ico" style="color:var(--coffee)"><i class="fa-solid fa-cart-shopping"></i></div>...</div>
                <div class="stat-card"><div class="ico" style="color:#e74c3c"><i class="fa-solid fa-heart"></i></div>...</div>
                <div class="stat-card"><div class="ico" style="color:var(--coffee)"><i class="fa-solid fa-clipboard-list"></i></div>...</div>
            </div>
            <div class="quick-actions">
                <a href="sell.html" class="btn-primary"><i class="fa fa-plus"></i> Jual Buku</a>
                <a href="catalog.html" class="btn-outline"><i class="fa fa-search"></i> Cari Buku</a>
                <a href="wishlist.html" class="btn-outline"><i class="fa fa-heart"></i> Wishlist</a>
                <a href="cart.html" class="btn-outline"><i class="fa fa-shopping-bag"></i> Keranjang</a>
            </div>
            <h3 style="font-size:1.1rem;margin-bottom:14px">Aktivitas Terakhir</h3>
            <div class="activity-list">
                <div class="act-item"><span class="act-ico"><i class="fa-solid fa-user-check"></i></span><span class="act-text">Akun kamu berhasil dibuat</span><span class="act-time">Baru saja</span></div>
                <div class="act-item"><span class="act-ico"><i class="fa-solid fa-circle-info"></i></span><span class="act-text">Fitur chat tersedia di setiap halaman buku</span><span class="act-time">Tips</span></div>
                <div class="act-item"><span class="act-ico"><i class="fa-regular fa-lightbulb"></i></span><span class="act-text">Mulai dengan menjelajahi katalog buku kampus</span><span class="act-time">Saran</span></div>
            </div>
            `;
        } else if (tab === 'listings') {
            el.innerHTML = `
            <div class="listing-controls">
                <h2 class="dash-title" style="margin:0">Listinganku</h2> </br>
                <a href="sell.html" class="btn-primary"><i class="fa fa-plus"></i> Tambah Buku</a>
            </div>
            ${ownBooks.length
                ? `<div class="book-grid">${ownBooks.map(b => buildBookCard(b, '../')).join('')}</div>`
                : `<div class="empty" style="text-align:center;padding:40px 0;"><i class="fa fa-book" style="font-size:2rem;color:var(--taupe);opacity:0.5"></i><p>Belum ada listing.</p><a href="sell.html" class="btn-primary" style="margin-top:14px">Jual Buku Pertamamu</a></div>`
            }
            `;
        } else if (tab === 'orders') {
            el.innerHTML = `
            <h2 class="dash-title">Pesananku</h2>
            ${[
                {title:'Kalkulus Edisi 9',seller:'Rizky A.',price:85000,date:'20 Jun 2025',status:'selesai',color:'#362417',tc:'#F1DABF'},
                {title:'Hukum Perdata Indonesia',seller:'Andi S.',price:45000,date:'18 Jun 2025',status:'proses',color:'#000500',tc:'#F1DABF'},
            ].map(o=>`
                <div class="order-row">
                <div class="order-bk" style="background:${o.color}"><span style="color:${o.tc};font-size:.55rem;font-family:'Playfair Display',serif;font-weight:700;text-align:center;padding:4px">${o.title.substring(0,12)}</span></div>
                <div class="order-info"><strong>${o.title}</strong><span>Dari ${o.seller} · ${o.date}</span></div>
                <div style="text-align:right">
                    <div style="font-family:'Playfair Display',serif;font-weight:700;color:var(--coffee);font-size:.95rem">Rp ${o.price.toLocaleString('id-ID')}</div>
                    <span class="status-pill s-${o.status}">${o.status==='selesai'?'Selesai':'Diproses'}</span>
                </div>
                </div>
            `).join('')}
            ${cart.length>0?`<h3 style="font-size:1.1rem;margin:20px 0 14px">Di Keranjang</h3>`+cart.map(b=>`
                <div class="order-row">
                <div class="order-bk" style="background:${b.clr}"><span style="color:${b.tcl};font-size:.5rem;font-family:'Playfair Display',serif;font-weight:700;text-align:center;padding:4px">${b.title.substring(0,12)}</span></div>
                <div class="order-info"><strong>${b.title}</strong><span>${b.seller} · ${b.condition}</span></div>
                <div class="bc-price" style="margin-left:auto;font-family:'Playfair Display',serif;font-weight:700;">${b.type==='Donasi'?'Gratis':b.type==='Ditukar'?'Tukar':'Rp '+b.price.toLocaleString('id-ID')}</div>
                </div>
            `).join(''):''}
            `;
        } else if (tab === 'wishlist') {
            el.innerHTML = `
            <h2 class="dash-title">Wishlist Saya</h2>
            ${wish.length
                ? `<div class="book-grid">${wish.map(b => buildBookCard(b, '../')).join('')}</div>`
                : `<div class="empty" style="text-align:center;padding:40px 0;"><i class="fa fa-heart" style="font-size:2rem;color:var(--taupe);opacity:0.5"></i><p>Belum ada buku tersimpan.</p><a href="catalog.html" class="btn-primary" style="margin-top:14px">Jelajahi Katalog</a></div>`
            }
            `;
        } else if (tab === 'messages') {
            el.innerHTML = `
            <h2 class="dash-title">Pesan</h2>
            <div class="msg-list">
                ${[
                {name:'Rizky A.',preview:'Masih tersedia! Harga bisa nego 😊',time:'10:32',seed:'Rizky',bg:'F1DABF',tc:'362417'},
                {name:'Sari W.',preview:'Oke, saya deal. Bisa COD di kampus?',time:'Kemarin',seed:'Sari',bg:'92817A',tc:'FFFFFF'},
                {name:'Budi P.',preview:'Terima kasih ya! Bukunya bagus sekali 👍',time:'Senin',seed:'Budi',bg:'362417',tc:'FFFFFF'},
                ].map(m=>`
                <div class="msg-row">
                    <img src="https://api.dicebear.com/7.x/initials/svg?seed=${m.seed}&backgroundColor=${m.bg}&textColor=${m.tc}" alt="${m.name}"/>
                    <div class="msg-info"><strong>${m.name}</strong><span>${m.preview}</span></div>
                    <span class="msg-time">${m.time}</span>
                </div>
                `).join('')}
            </div>
            `;
            } else if (tab === 'profile') {
            el.innerHTML = `
            <h2 class="dash-title">Pengaturan Profil</h2>
            
            <div style="background: var(--snow); border: 1.5px solid var(--border); border-radius: var(--r-xl); padding: 32px; max-width: 760px; box-shadow: var(--shadow-sm);">
                
                <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1.5px solid var(--border); flex-wrap: wrap;">
                <img src="${avatarUrl(u.name)}" id="profImg" alt="${u.name}" style="width: 86px; height: 86px; border-radius: 50%; border: 3px solid var(--almond-mid); box-shadow: var(--shadow-sm); flex-shrink: 0;"/>
                <div style="flex: 1; min-width: 200px;">
                    <h3 style="font-size: 1.25rem; margin-bottom: 4px; color: var(--black); font-family: 'DM Sans', sans-serif;">${u.name}</h3>
                    <p style="font-size: 0.85rem; color: var(--taupe); margin-bottom: 14px;">Format foto direkomendasikan 1:1 (persegi), maksimal ukuran 2MB.</p>
                    <div style="display: flex; gap: 10px;">
                    <button class="btn-primary sm" onclick="showToast('Fitur upload foto segera hadir!')"><i class="fa fa-camera"></i> Ubah Foto</button>
                    <button class="btn-outline sm" onclick="showToast('Fitur hapus foto segera hadir!')"><i class="fa fa-trash"></i> Hapus</button>
                    </div>
                </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px;">
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Nama Lengkap</label>
                    <div class="input-icon-wrap">
                    <i class="fa fa-user input-icon"></i>
                    <input type="text" id="pName" class="form-control" value="${u.name}"/>
                    </div>
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Email Kampus</label>
                    <div class="input-icon-wrap">
                    <i class="fa fa-envelope input-icon"></i>
                    <input type="email" class="form-control" value="${u.email}" readonly style="background:var(--almond-light); color:var(--taupe); cursor:not-allowed;"/>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Asal Kampus</label>
                    <div class="input-icon-wrap">
                    <i class="fa fa-university input-icon"></i>
                    <input type="text" id="pCampus" class="form-control" value="${u.campus||''}"/>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Program Studi</label>
                    <div class="input-icon-wrap">
                    <i class="fa fa-graduation-cap input-icon"></i>
                    <input type="text" id="pProdi" class="form-control" value="${u.major||''}"/>
                    </div>
                </div>

                </div>

                <div class="form-group" style="margin-top: 18px; margin-bottom: 28px;">
                <label class="form-label">Nomor WhatsApp</label>
                <div class="input-icon-wrap">
                    <i class="fab fa-whatsapp input-icon" style="color:#25D366; font-size: 1.1rem;"></i>
                    <input type="text" id="pWA" class="form-control" value="${u.wa||''}" placeholder="Cth: 0812xxxxxx"/>
                </div>
                <p class="form-hint" style="font-size: 0.8rem; color: var(--text-muted); margin-top: 6px;"><i class="fa-solid fa-info-circle"></i> Nomor ini digunakan agar calon pembeli bisa langsung menghubungimu untuk COD/Tanya buku.</p>
                </div>

                <div style="display: flex; justify-content: flex-end; padding-top: 18px; border-top: 1.5px solid var(--border);">
                <button class="btn-primary lg" onclick="saveProfile()"><i class="fa fa-save"></i> Simpan Perubahan</button>
                </div>

            </div>
            `;
        }
        }

        function saveProfile() {
        const u = AppState.user;
        u.name   = document.getElementById('pName').value.trim() || u.name;
        u.campus = document.getElementById('pCampus').value.trim();
        u.major  = document.getElementById('pProdi').value.trim();
        u.wa     = document.getElementById('pWA').value.trim();
        AppState.save();
        document.getElementById('profImg').src = avatarUrl(u.name);
        document.getElementById('dashProfile').innerHTML = `<img src="${avatarUrl(u.name)}" alt="${u.name}"/><div><h4>${u.name}</h4><p>${u.email}</p></div>`;
        showToast('<i class="fa-solid fa-check-circle"></i> Profil berhasil diperbarui!');
        }
    </script>
    </body>
    </html>
